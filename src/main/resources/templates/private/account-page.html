<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ToDo List | My Account</title>
    <link th:href="@{/private/account-page.css}" rel="stylesheet">
    <link th:href="@{/fragments/header-fragment.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header-fragment.html :: header-fragment (userName=${userName})}"></div>
<div class="page-wrapper">
    <div class="container">
        <div class="header-container">
            <div class="header__text">
                <h2>My Tasks</h2>
            </div>
            <div class="header__statistics">
                <span th:text="${numberOfActiveRecords + ' active, ' + numberOfDoneRecords + ' completed'}">0 more to do, 0 done</span>
            </div>
        </div>

        <div class="filter-container">
            <form th:with="filter=${#strings.toLowerCase(param.filter)}" action="/account" method="get" class="filter-form">
                <div class="filter-group">
                    <div class="filter-option">
                        <input th:checked="${filter != 'active' and filter != 'done'}" type="radio"
                               id="filter-all" name="filter" value="all" onchange="this.form.submit()">
                        <label for="filter-all">All</label>
                    </div>
                    <div class="filter-option">
                        <input th:checked="${filter == 'active'}" type="radio"
                               id="filter-active" name="filter" value="active" onchange="this.form.submit()">
                        <label for="filter-active">Active</label>
                    </div>
                    <div class="filter-option">
                        <input th:checked="${filter == 'done'}" type="radio"
                               id="filter-done" name="filter" value="done" onchange="this.form.submit()">
                        <label for="filter-done">Done</label>
                    </div>
                </div>
                <noscript><button type="submit">Apply</button></noscript>
            </form>
        </div>

        <div th:with="isRecordsEmpty=${records == null || records.isEmpty()}" class="records-container">
            <div th:if="${isRecordsEmpty}" th:switch="${#strings.toLowerCase(param.filter)}" class="hint">
                <p th:case="'active'">No active tasks found.</p>
                <p th:case="'done'">No completed tasks yet.</p>
                <p th:case="*">Your task list is empty. Add your first task below!</p>
            </div>
            
            <div th:if="${!isRecordsEmpty}" th:each="record: ${records}" class="record">
                <div class="record__content">
                    <span th:text="${record.title}"
                          th:classappend="${record.status.name == 'DONE' ? 'record__title_strikethrough' : ''}"></span>
                </div>
                <div class="record__actions">
                    <form th:if="${record.status.name == 'ACTIVE'}" action="/account/make-record-done" method="post">
                        <input th:value="${record.id}" type="hidden" name="id">
                        <input th:value="${param.filter}" type="hidden" name="filter">
                        <button type="submit" class="btn-icon btn-done" title="Mark as done">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </button>
                    </form>
                    <form action="/account/delete-record" method="post">
                        <input th:value="${record.id}" type="hidden" name="id">
                        <input th:value="${param.filter}" type="hidden" name="filter">
                        <button type="submit" class="btn-icon btn-delete" title="Delete task">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="management-container">
            <form action="/account/add-record" method="post" class="management-form">
                <input type="text" name="title" placeholder="What needs to be done?" 
                       class="management-form__input" required minlength="1" maxlength="150">
                <button type="submit" class="management-form__button">Add Task</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
