<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Management | ToDo List</title>
    <link rel="stylesheet" th:href="@{/private/admin/management-page.css}">
    <link th:href="@{/fragments/header-fragment.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header-fragment.html :: header-fragment (userName=${userName})}"></div>
<div class="page-wrapper">
    <div class="container">
        <div class="header-container">
            <div class="header__text">
                <h2>User Management</h2>
            </div>
        </div>
        <div th:with="isCandidatesToDeleteEmpty=${candidatesToDelete == null or candidatesToDelete.isEmpty()}" class="records-container">
            <div th:if="${isCandidatesToDeleteEmpty}" class="hint">
                <p>No users found in the system.</p>
            </div>
            <div th:if="${!isCandidatesToDeleteEmpty}" th:each="user: ${candidatesToDelete}" class="record">
                <div class="record__title">
                    <span th:text="${user.email}"></span>
                    <span class="role-badge" th:text="${user.role.name}">USER</span>
                </div>
                <div class="record__controls">
                    <form action="/admin/delete-user" method="post">
                        <input th:value="${user.id}" type="hidden" name="id">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div sec:authorize="hasRole('ROLE_SUPER_ADMIN')" class="container">
        <div class="header-container">
            <div class="header__text">
                <h2>Upgrade to Admin</h2>
            </div>
        </div>
        <div th:with="isCandidatesToUpgradeEmpty=${candidatesToUpgrade == null or candidatesToUpgrade.isEmpty()}" class="form-container">
            <form action="/super-admin/make-user-admin" method="post">
                <div class="form-group">
                    <select name="id" class="form-container__select" required>
                        <option th:if="${isCandidatesToUpgradeEmpty}" value="" disabled selected>No eligible users</option>
                        <option th:if="${!isCandidatesToUpgradeEmpty}" th:each="user: ${candidatesToUpgrade}" 
                                th:value="${user.id}" th:text="${user.email}"></option>
                    </select>
                </div>
                <div class="form-container__button-wrapper">
                    <button th:disabled="${isCandidatesToUpgradeEmpty}" 
                            th:classappend="${isCandidatesToUpgradeEmpty ? 'form-container__button_disabled' : ''}" 
                            type="submit" class="form-container__button">Upgrade User</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
